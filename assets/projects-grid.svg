<svg width="1200" height="620" viewBox="0 0 1200 620" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#4338ca"/></linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#be185d"/></linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0f766e"/></linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f97316"/><stop offset="100%" stop-color="#c2410c"/></linearGradient>
    <linearGradient id="c5" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#a855f7"/><stop offset="100%" stop-color="#7e22ce"/></linearGradient>
    <linearGradient id="c6" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#3b82f6"/><stop offset="100%" stop-color="#1d4ed8"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Card template repeated with different fills/text -->
  <!-- Card 1 -->
  <g filter="url(#sh)">
    <rect x="20" y="20" width="368" height="280" rx="22" fill="url(#c1)"/>
  </g>
  <text x="52" y="80" font-size="34">🛡️</text>
  <text x="52" y="130" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">IoT Attack Detection</text>
  <text x="52" y="155" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#c7d2fe">FINAL YEAR PROJECT</text>
  <text x="52" y="190" font-family="'Segoe UI',sans-serif" font-size="13" fill="#e0e7ff">
    <tspan x="52" dy="0">Random Forest + XGBoost models</tspan>
    <tspan x="52" dy="20">behind a Flask API, with a live</tspan>
    <tspan x="52" dy="20">React.js dashboard.</tspan>
  </text>
  <rect x="52" y="255" width="70" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="87" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">Python</text>
  <rect x="130" y="255" width="66" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="163" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">React</text>
  <rect x="204" y="255" width="70" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="239" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">Flask</text>

  <!-- Card 2 -->
  <g filter="url(#sh)">
    <rect x="416" y="20" width="368" height="280" rx="22" fill="url(#c2)"/>
  </g>
  <text x="448" y="80" font-size="34">⚡</text>
  <text x="448" y="130" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">FE-GBE Ensemble IDS</text>
  <text x="448" y="155" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#fbcfe8">RESEARCH PAPER · IEEE FORMAT</text>
  <text x="448" y="190" font-family="'Segoe UI',sans-serif" font-size="13" fill="#fce7f3">
    <tspan x="448" dy="0">LightGBM + XGBoost ensemble,</tspan>
    <tspan x="448" dy="20">~99% accuracy on the CICIoT2023</tspan>
    <tspan x="448" dy="20">dataset.</tspan>
  </text>
  <rect x="448" y="255" width="80" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="488" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">LightGBM</text>
  <rect x="534" y="255" width="78" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="573" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">XGBoost</text>

  <!-- Card 3 -->
  <g filter="url(#sh)">
    <rect x="812" y="20" width="368" height="280" rx="22" fill="url(#c3)"/>
  </g>
  <text x="844" y="80" font-size="34">🌿</text>
  <text x="844" y="130" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">Plant Disease CNN</text>
  <text x="844" y="155" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#99f6e4">DEPLOYED · HUGGING FACE</text>
  <text x="844" y="190" font-family="'Segoe UI',sans-serif" font-size="13" fill="#ccfbf1">
    <tspan x="844" dy="0">ResNet-style CNN hitting 99.3%</tspan>
    <tspan x="844" dy="20">validation accuracy, live as a</tspan>
    <tspan x="844" dy="20">Hugging Face Space.</tspan>
  </text>
  <rect x="844" y="255" width="80" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="884" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">PyTorch</text>
  <rect x="930" y="255" width="60" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="960" y="272" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">CNN</text>

  <!-- Card 4 -->
  <g filter="url(#sh)">
    <rect x="20" y="320" width="368" height="280" rx="22" fill="url(#c4)"/>
  </g>
  <text x="52" y="380" font-size="34">🎨</text>
  <text x="52" y="430" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">Atelier Pro</text>
  <text x="52" y="455" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#fed7aa">SINGLE-FILE PHOTO EDITOR</text>
  <text x="52" y="490" font-family="'Segoe UI',sans-serif" font-size="13" fill="#ffedd5">
    <tspan x="52" dy="0">Tone curves, HSL adjustment,</tspan>
    <tspan x="52" dy="20">local masking, batch export &amp;</tspan>
    <tspan x="52" dy="20">AI captions — all in one HTML file.</tspan>
  </text>
  <rect x="52" y="555" width="100" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="102" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">JavaScript</text>
  <rect x="160" y="555" width="90" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="205" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">Canvas API</text>

  <!-- Card 5 -->
  <g filter="url(#sh)">
    <rect x="416" y="320" width="368" height="280" rx="22" fill="url(#c5)"/>
  </g>
  <text x="448" y="380" font-size="34">🎮</text>
  <text x="448" y="430" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">Game Rating Platform</text>
  <text x="448" y="455" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#e9d5ff">FULL-STACK APP</text>
  <text x="448" y="490" font-family="'Segoe UI',sans-serif" font-size="13" fill="#f3e8ff">
    <tspan x="448" dy="0">Rate and review games with a</tspan>
    <tspan x="448" dy="20">React front end, Node backend,</tspan>
    <tspan x="448" dy="20">and MongoDB storage.</tspan>
  </text>
  <rect x="448" y="555" width="66" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="481" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">React</text>
  <rect x="522" y="555" width="70" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="557" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">Node.js</text>
  <rect x="600" y="555" width="90" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="645" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">MongoDB</text>

  <!-- Card 6 -->
  <g filter="url(#sh)">
    <rect x="812" y="320" width="368" height="280" rx="22" fill="url(#c6)"/>
  </g>
  <text x="844" y="380" font-size="34">🔢</text>
  <text x="844" y="430" font-family="'Segoe UI',sans-serif" font-size="20" font-weight="800" fill="#ffffff">MNIST Classifier</text>
  <text x="844" y="455" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="600" fill="#bfdbfe">DEEP LEARNING BASICS</text>
  <text x="844" y="490" font-family="'Segoe UI',sans-serif" font-size="13" fill="#dbeafe">
    <tspan x="844" dy="0">Handwritten digit recognition</tspan>
    <tspan x="844" dy="20">built from scratch — the classic</tspan>
    <tspan x="844" dy="20">deep learning starting point.</tspan>
  </text>
  <rect x="844" y="555" width="80" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="884" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">Python</text>
  <rect x="930" y="555" width="110" height="26" rx="13" fill="#ffffff" opacity="0.2"/>
  <text x="985" y="572" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="11" font-weight="700" fill="#ffffff">TensorFlow</text>
</svg>
