<svg width="720" height="300" viewBox="0 0 720 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cardBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
    <linearGradient id="chip1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="chip2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="chip3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#6366f1" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="10" y="10" width="700" height="280" rx="24" fill="url(#cardBg)" filter="url(#shadow)" stroke="#ede9fe" stroke-width="2"/>

  <text x="42" y="60" font-family="'Segoe UI',sans-serif" font-size="24" font-weight="800" fill="#312e81">✨ About Me</text>

  <text x="42" y="100" font-family="'Segoe UI',sans-serif" font-size="15" fill="#4b5563">
    <tspan x="42" dy="0">BS Computer Science student at the</tspan>
    <tspan x="42" dy="24" font-weight="700" fill="#7c3aed">University of Central Punjab, Lahore</tspan>
    <tspan x="42" dy="24">Living at the intersection of machine</tspan>
    <tspan x="42" dy="24">learning and network security — plus a</tspan>
    <tspan x="42" dy="24">side habit of building full apps inside a</tspan>
    <tspan x="42" dy="24">single HTML file, just to see if I can.</tspan>
  </text>

  <rect x="42" y="248" width="150" height="32" rx="16" fill="url(#chip1)"/>
  <text x="117" y="269" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ffffff">Machine Learning</text>

  <rect x="202" y="248" width="130" height="32" rx="16" fill="url(#chip2)"/>
  <text x="267" y="269" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ffffff">IoT Security</text>

  <rect x="342" y="248" width="170" height="32" rx="16" fill="url(#chip3)"/>
  <text x="427" y="269" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="12" font-weight="700" fill="#ffffff">Muteen Traders 🛍️</text>

  <circle cx="655" cy="60" r="26" fill="url(#chip1)" opacity="0.15"/>
  <circle cx="680" cy="100" r="14" fill="url(#chip2)" opacity="0.18"/>
</svg>
