<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="45%" stop-color="#0f1c2e"/>
      <stop offset="100%" stop-color="#0a0e1a"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f7ff"/>
      <stop offset="50%" stop-color="#7f5af0"/>
      <stop offset="100%" stop-color="#00f7ff">
        <animate attributeName="offset" values="0.6;1.4;0.6" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>

  <g stroke="#1c2a3f" stroke-width="1">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="260" x2="1200" y2="260"/>
    <line x1="150" y1="0" x2="150" y2="320"/>
    <line x1="1050" y1="0" x2="1050" y2="320"/>
  </g>

  <g fill="none" stroke="#00f7ff" stroke-width="2" opacity="0.55">
    <path d="M 0 60 L 100 60 L 130 30 L 300 30">
      <animate attributeName="stroke-dasharray" values="0,600;600,0" dur="3.5s" repeatCount="indefinite"/>
    </path>
    <path d="M 1200 260 L 1000 260 L 970 290 L 800 290">
      <animate attributeName="stroke-dasharray" values="0,600;600,0" dur="4.2s" repeatCount="indefinite"/>
    </path>
    <path d="M 1050 60 L 1150 60 L 1150 20">
      <animate attributeName="stroke-dasharray" values="0,250;250,0" dur="2.6s" repeatCount="indefinite"/>
    </path>
  </g>
  <circle cx="300" cy="30" r="4" fill="#00f7ff">
    <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="800" cy="290" r="4" fill="#7f5af0">
    <animate attributeName="r" values="3;6;3" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1150" cy="20" r="4" fill="#00f7ff">
    <animate attributeName="r" values="3;6;3" dur="1.8s" repeatCount="indefinite"/>
  </circle>

  <text x="600" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-size="54" font-weight="700" fill="url(#textGrad)" filter="url(#glow)">
    MUHAMMAD MUTEEN AMER
  </text>

  <text x="600" y="195" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" fill="#8b9bb4">
    <tspan fill="#00f7ff">&gt;</tspan> CS Student · ML &amp; IoT Security · Builder of things
    <animate attributeName="opacity" values="1;1;0.3;1" dur="1.4s" repeatCount="indefinite"/>
  </text>

  <rect x="835" y="180" width="12" height="22" fill="#00f7ff">
    <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
  </rect>

  <text x="600" y="240" text-anchor="middle" font-family="'Courier New', monospace" font-size="14" fill="#4a5b78" letter-spacing="3">
    LAHORE, PAKISTAN — UNIVERSITY OF CENTRAL PUNJAB
  </text>
</svg>
