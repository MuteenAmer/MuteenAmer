<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="35%" stop-color="#a855f7"/>
      <stop offset="70%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="blob1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe066" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ffe066" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blob3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00f5d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#00f5d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20"/>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>

  <g filter="url(#soft)">
    <circle cx="150" cy="60" r="140" fill="url(#blob1)">
      <animate attributeName="cx" values="150;190;150" dur="8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1050" cy="260" r="170" fill="url(#blob2)">
      <animate attributeName="cy" values="260;220;260" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="950" cy="60" r="120" fill="url(#blob3)">
      <animate attributeName="r" values="120;150;120" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="200" cy="280" r="100" fill="url(#blob3)" opacity="0.6"/>
  </g>

  <rect x="70" y="245" width="120" height="34" rx="17" fill="#ffffff" opacity="0.16"/>
  <rect x="1000" y="30" width="140" height="34" rx="17" fill="#ffffff" opacity="0.16"/>

  <text x="600" y="150" text-anchor="middle" font-family="'Poppins','Segoe UI',sans-serif" font-size="56" font-weight="800" fill="#ffffff">
    Muhammad Muteen Amer
  </text>

  <text x="600" y="195" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="21" font-weight="500" fill="#fdf4ff">
    CS Student · ML &amp; IoT Security · Builder of Things
  </text>

  <g font-family="'Segoe UI',sans-serif" font-size="14" font-weight="600" fill="#4c1d95">
    <rect x="430" y="222" width="120" height="34" rx="17" fill="#ffffff"/>
    <text x="490" y="244" text-anchor="middle">UCP Lahore</text>

    <rect x="565" y="222" width="150" height="34" rx="17" fill="#ffffff"/>
    <text x="640" y="244" text-anchor="middle">Open to Collab</text>
  </g>
</svg>
